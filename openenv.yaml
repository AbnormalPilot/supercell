spec_version: 1
name: supercell
type: space
runtime: fastapi
app: app:create_app
port: 7860
version: "1.0.0"
description: "SUPERCELL — Simplified ATC emergency triage for Meta PyTorch Hackathon."
action: ATCAction
observation: ATCObservation

graders:
  - id: easy
    type: deterministic
    endpoint: /grade
    scoring_range: [0.0, 1.0]
  - id: medium
    type: deterministic
    endpoint: /grade
    scoring_range: [0.0, 1.0]
  - id: hard
    type: deterministic
    endpoint: /grade
    scoring_range: [0.0, 1.0]
  - id: extra_hard
    type: deterministic
    endpoint: /grade
    scoring_range: [0.0, 1.0]

tasks:
  - id: easy
    name: "Clear Skies Priority"
    description: "4 inbound flights under clear skies. One MAYDAY fuel emergency and one PAN-PAN with medical passenger."
    grader:
      id: easy
      type: deterministic
      endpoint: /grade
      scoring_range: [0.0, 1.0]

  - id: medium
    name: "Storm Window"
    description: "7 inbound flights with a storm approaching. Balance fuel urgency against shrinking weather window."
    grader:
      id: medium
      type: deterministic
      endpoint: /grade
      scoring_range: [0.0, 1.0]

  - id: hard
    name: "Mass Diversion Crisis"
    description: "12 aircraft diverted with three MAYDAYs, two PAN-PANs, fuel traps, and oscillating weather."
    grader:
      id: hard
      type: deterministic
      endpoint: /grade
      scoring_range: [0.0, 1.0]

  - id: extra_hard
    name: "Total System Chaos"
    description: "20 aircraft in a total system failure scenario. Five MAYDAYs with fuel critical (<8 min), four PAN-PANs with medical emergencies, VFR aircraft that need 4-5nm visibility, and extreme weather volatility."
    grader:
      id: extra_hard
      type: deterministic
      endpoint: /grade
      scoring_range: [0.0, 1.0]
