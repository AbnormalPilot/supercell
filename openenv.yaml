spec_version: 1
name: supercell
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: "1.0.0"
description: >
  SUPERCELL — Monsoon Mumbai ATC Emergency Triage. An OpenEnv-compliant
  environment set at VABB (Chhatrapati Shivaji Intl, Mumbai) where the
  agent plays Tower Controller during monsoon operations, sequencing
  landings on a single active runway under fuel, weather, wake-turbulence,
  and emergency constraints. Four graded tasks span winter haze through
  a full monsoon surge, each with a deterministic [0.01, 0.99] grader
  and dense partial-progress reward shaping.
author: SUPERCELL Team
tags:
  - openenv
  - reinforcement-learning
  - agent-evaluation
  - atc
  - aviation
  - mumbai

entrypoint:
  command: uv run python app.py

interface:
  base_url: http://localhost:7860
  endpoints:
    reset: /reset
    step: /step
    state: /state
    health: /health
    metadata: /metadata
    schema: /schema
    grader: /grader
    tasks: /tasks
    mcp: /mcp

observation_space:
  type: object
  properties:
    flights:
      type: array
      description: "Inbound aircraft on approach to VABB"
      items:
        type: object
        properties:
          index:
            type: integer
          callsign:
            type: string
          aircraft_type:
            type: string
          emergency:
            type: string
            enum: [NONE, PAN_PAN, MAYDAY]
          fuel_minutes:
            type: number
          passengers:
            type: integer
          distance_nm:
            type: number
          medical_onboard:
            type: boolean
          min_visibility_nm:
            type: number
          wake_category:
            type: string
            enum: [LIGHT, MEDIUM, HEAVY, SUPER]
          can_land_now:
            type: boolean
          bearing_deg:
            type: number
          approach_fix:
            type: string
    weather:
      type: object
      properties:
        visibility_nm:
          type: number
        wind_knots:
          type: number
        crosswind_knots:
          type: number
        ceiling_feet:
          type: number
        precipitation:
          type: string
        trend:
          type: string
    runway_free_in_steps:
      type: integer
    time_step:
      type: integer
    max_time_steps:
      type: integer
    landed_safely:
      type: integer
    crashed:
      type: integer
    total_flights:
      type: integer
    task_id:
      type: string
    task_name:
      type: string
    done:
      type: boolean
    reward:
      type: number
    episode_reward:
      type: number

action_space:
  type: object
  properties:
    flight_index:
      type: integer
      minimum: 0
      description: "0-based index into observation.flights — the inbound to clear for landing"

tasks:
  - id: task-001-winter-haze
    name: Winter Haze
    difficulty: easy
    description: Calm November dawn at VABB — one MAYDAY fuel emergency and one medical PAN-PAN with clear skies.
    reward_range: [0.01, 0.99]
    has_grader: true
    grader: /grader
    grader_url: /grader?task_id=task-001-winter-haze
    grader_endpoint: /grader

  - id: task-002-pre-monsoon-squall
    name: Pre-Monsoon Squall
    difficulty: medium
    description: May squall line closes visibility from 8 nm to 1 nm while seven inbounds race the window.
    reward_range: [0.01, 0.99]
    has_grader: true
    grader: /grader
    grader_url: /grader?task_id=task-002-pre-monsoon-squall
    grader_endpoint: /grader

  - id: task-003-mumbai-monsoon-surge
    name: Mumbai Monsoon Surge
    difficulty: hard
    description: Twelve diverted aircraft, three MAYDAYs, fuel traps, oscillating thunderstorm. Fuel-first sequencing beats emergency-label heuristics.
    reward_range: [0.01, 0.99]
    has_grader: true
    grader: /grader
    grader_url: /grader?task_id=task-003-mumbai-monsoon-surge
    grader_endpoint: /grader

  - id: task-004-total-system-chaos
    name: Total System Chaos
    difficulty: hard
    description: Hidden bonus — twenty aircraft, five critical-fuel MAYDAYs, VFR-only jets, violently oscillating weather.
    reward_range: [0.01, 0.99]
    has_grader: true
    grader: /grader
    grader_url: /grader?task_id=task-004-total-system-chaos
    grader_endpoint: /grader
